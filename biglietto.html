<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Biglietto di San Valentino</title>

    <style>
        body {
            background-color: #8b0000;
            font-family: 'Georgia', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Cuori che cadono */
        .heart-fall {
            position: absolute;
            top: -10px;
            color: rgba(255, 182, 193, 0.9);
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh);
                opacity: 0;
            }
        }

        /* Biglietto */
        .ticket {
            position: relative;
            z-index: 2;
            background: linear-gradient(135deg, #ff1e56, #b3002d);
            color: white;
            width: 360px;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
            animation: fadeIn 1.8s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        h1 {
            margin-top: 0;
            font-size: 26px;
            letter-spacing: 2px;
        }

        /* Cuore che batte */
        .heart {
            font-size: 34px;
            margin: 12px 0;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% {
                transform: scale(1);
            }

            25% {
                transform: scale(1.2);
            }

            40% {
                transform: scale(1);
            }

            60% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Domanda */
        .question {
            font-size: 20px;
            font-weight: bold;
            margin: 20px 0;
        }

        /* Scelte */
        .choices {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .choice {
            padding: 12px 22px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.2);
            transition: transform 0.2s;
        }

        .choice:hover {
            transform: scale(1.1);
        }

        /* Messaggio sì */
        .yes-message {
            display: none;
            font-size: 28px;
            font-weight: bold;
            margin-top: 15px;
        }

        /* CUORE GIGANTE FULLSCREEN */
        .big-heart {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20vw;
            opacity: 0;
            z-index: 999;
            animation: fullscreenHeart 1.5s ease forwards;
        }

        @keyframes fullscreenHeart {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            40% {
                transform: scale(1);
                opacity: 1;
            }

            70% {
                transform: scale(4);
                opacity: 1;
            }

            100% {
                transform: scale(8);
                opacity: 0;
            }
        }

        /* Cuori esplosione */
        .burst {
            position: fixed;
            font-size: 24px;
            animation: burst 1.2s ease forwards;
        }

        @keyframes burst {
            to {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

        p {
            font-size: 16px;
            line-height: 1.5;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="ticket">
        <h1> SAN VALENTINO</h1>
        <div class="heart">❤️</div>

        <div class="question">
            Vuoi essere il mio San Valentino?
        </div>

        <div class="choices">
            <div class="choice" onclick="sayYes()">SÌ 💖</div>
            <div class="choice" id="no" onmouseover="moveNo()">NO 🙈</div>
        </div>

        <div class="yes-message" id="yesMessage">SÌ 💘</div>

        <p>
            Ogni momento con te<br>
            è il mio posto preferito.<br>
            Ogni sorriso tuo mi riscalda il cuore<br>
            sei casa.
        </p>

        <div class="footer">
            14 Febbraio 💌<br>
            Con amore, <strong>Oussama</strong>
        </div>
    </div>

    <script>
        // Cuori che cadono
        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart-fall";
            heart.innerHTML = "❤️";
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 15 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 4) + "s";
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }
        setInterval(createHeart, 400);

        // Click su SÌ
        function sayYes() {
            document.getElementById("yesMessage").style.display = "block";
            giantHeartExplosion();
        }

        // Cuore gigante fullscreen che esplode
        function giantHeartExplosion() {
            const bigHeart = document.createElement("div");
            bigHeart.className = "big-heart";
            bigHeart.innerHTML = "❤️";
            document.body.appendChild(bigHeart);

            setTimeout(() => {
                for (let i = 0; i < 40; i++) {
                    const burst = document.createElement("div");
                    burst.className = "burst";
                    burst.innerHTML = "💖";
                    burst.style.top = "50%";
                    burst.style.left = "50%";
                    burst.style.setProperty("--x", `${Math.random()*600 - 300}px`);
                    burst.style.setProperty("--y", `${Math.random()*600 - 300}px`);
                    document.body.appendChild(burst);
                    setTimeout(() => burst.remove(), 1200);
                }
                bigHeart.remove();
            }, 1200);
        }

        // NO che scappa
        function moveNo() {
            const no = document.getElementById("no");
            no.style.transform = `translate(${Math.random()*200-100}px, ${Math.random()*100-50}px)`;
        }
    </script>

</body>

</html>
